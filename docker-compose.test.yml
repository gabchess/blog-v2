services:
  mongodb-test:
    image: mongo:7
    ports:
      - "27018:27017"
    command: --replSet rs0 --bind_ip_all
    tmpfs:
      - /data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 2s
      timeout: 3s
      retries: 10

  mongo-test-init:
    image: mongo:7
    depends_on:
      mongodb-test:
        condition: service_healthy
    entrypoint: >
      mongosh mongodb-test:27017 --eval '
        rs.status().ok || rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})
      '
